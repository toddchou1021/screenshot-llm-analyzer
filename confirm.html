<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Screenshot</title>
    <script src="./theme-init.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="confirm-body">
    <main class="confirm-shell">
      <aside class="confirm-prompt-pane">
        <h2>User Prompt</h2>
        <div id="confirmPromptList" class="confirm-prompt-list"></div>
      </aside>
      <div class="confirm-preview-pane">
        <header>
          <h1>Confirm Screenshot</h1>
          <p>Enter to analyze. Esc to cancel.</p>
        </header>
        <img id="confirmImage" alt="Captured screenshot preview" />
        <label class="confirm-edit-field">
          <span>User prompt</span>
          <textarea id="confirmPromptInput" spellcheck="true"></textarea>
        </label>
        <div class="confirm-actions">
          <button id="cancelButton" type="button">Cancel</button>
          <button id="analyzeButton" type="button">Analyze</button>
        </div>
      </div>
    </main>
    <script src="./confirm.js"></script>
  </body>
</html>
