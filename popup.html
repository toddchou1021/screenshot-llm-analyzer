<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshot Analysis</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="popup-body">
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1 id="popupTitle">Analysis</h1>
          <p id="popupMeta"></p>
        </div>
        <button id="openScreenshotButton" type="button">Open Screenshot</button>
      </header>
      <img id="popupImage" alt="Captured screenshot" />
      <pre id="popupResult"></pre>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
